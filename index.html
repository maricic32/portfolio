<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artify</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="fav/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="fav/favicon.svg" />
<link rel="shortcut icon" href="fav/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="fav/apple-touch-icon.png" />
<link rel="manifest" href="fav/site.webmanifest" />
</head>

<body>
    <header>
    <div class="logo">Artify Portfolio</div>

    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About us</a></li>
            <li><a href="gallery.html">Portfolio</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
        <div class="menu-toggle">
        ☰
    </div>
</header>
    <section class="home" id="home">

        <div class="overlay"></div>

        <div class="home-content">

            <h1>Welcome To Artify Portfolio</h1>

            <p>
                Moderna portfolio platforma gde umetnici, dizajneri i kreatori predstavljaju svoju jedinstvenu viziju svetu.
            </p>

            <button id="openModal">Sign In</button>

            </div>

    </section>
    

    <footer>

        <p>
            © 2026 Artify Portfolio | All Rights Reserved
        </p>

    </footer>
    <div id="modal" class="modal">

  <div class="modal-content">

    <span class="close" id="closeModal">&times;</span>

    <h2>Sign In</h2>

    <form>
        <input type="email" placeholder="Enter your email" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

  </div>

</div>
<script>
    const modal = document.getElementById("modal");
    const openBtn = document.getElementById("openModal");
    const closeBtn = document.getElementById("closeModal");

    openBtn.onclick = function(){
        modal.classList.add("show");
    }

    closeBtn.onclick = function(){
        modal.classList.remove("show");
    }

    window.onclick = function(e){
        if(e.target == modal){
            modal.classList.remove("show");
        }
    }
</script>
<script>
const menuToggle = document.querySelector('.menu-toggle');
const nav = document.querySelector('nav');

menuToggle.addEventListener('click', () => {
    nav.classList.toggle('active');
});
</script>

</body>
</html>
